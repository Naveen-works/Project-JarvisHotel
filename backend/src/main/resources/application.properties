spring.application.name=backend

# Activate the 'dev' profile locally
spring.profiles.active=dev

# Database Connection (Safe to share the URL)
spring.datasource.url=jdbc:postgresql://localhost:5432/JarvisHotelDB

server.port=8082
# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG

# JWT
app.jwt.secret=YXBwLWp3dC1zZWNyZXQtbXVzdC1iZS1jaGFuZ2VkLWluLXByb2R1Y3Rpb24=
app.jwt.expiration-ms=86400000

# Mail (configure with your SMTP values)
spring.mail.host=localhost
spring.mail.port=1025

spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
